version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: axionch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: axionch
      POSTGRES_PASSWORD: axionch
      POSTGRES_DB: axionch
    ports:
      - "5432:5432"
    volumes:
      - axionch_postgres_data:/var/lib/postgresql/data

volumes:
  axionch_postgres_data:
